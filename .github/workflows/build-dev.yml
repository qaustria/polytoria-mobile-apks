name: Build Dev APK

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: write

env:
  GODOT_VERSION: "4.7"
  DOTNET_VERSION: "10.0.x"

jobs:
  build-dev-apk:
    runs-on: ubuntu-latest
    name: Build Dev APK

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Android SDK
        id: cache-android
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: android-sdk-34-36-ndk29-v1

      - name: Install Android SDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/android-sdk/cmdline-tools
          cd ~/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          SDKMANAGER="$HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          # Godot 4.7 compiles with API 36; the export preset targets API 34.
          "$SDKMANAGER" \
            "platforms;android-34" \
            "platforms;android-36" \
            "build-tools;34.0.0" \
            "build-tools;36.1.0" \
            "platform-tools" \
            "ndk;29.0.14206865"

      - name: Set Android env vars
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-mono-${{ env.GODOT_VERSION }}-v1

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          GODOT_ARCHIVE="Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_ARCHIVE}.zip"
          wget -q "$GODOT_URL" -O godot.zip
          unzip -q godot.zip -d /tmp/godot
          mkdir -p "$HOME/godot"
          mv "/tmp/godot/${GODOT_ARCHIVE}/Godot_v${GODOT_VERSION}-stable_mono_linux.x86_64" "$HOME/godot/godot"
          mv "/tmp/godot/${GODOT_ARCHIVE}/GodotSharp" "$HOME/godot/GodotSharp"
          chmod +x "$HOME/godot/godot"

      - name: Add Godot to PATH
        run: |
          echo "$HOME/godot" >> "$GITHUB_PATH"
          "$HOME/godot/godot" --version

      - name: Cache Export Templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-mono-templates-${{ env.GODOT_VERSION }}-v1

      - name: Download Export Templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_export_templates.tpz"
          wget -q "$TEMPLATES_URL" -O export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
          unzip -q export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/

      - name: Clone Polytoria (latest main)
        run: |
          git clone --depth 1 https://github.com/Polytoria/polytoria-game.git upstream
          cd upstream
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "COMMIT_DATE=$COMMIT_DATE" >> $GITHUB_ENV
          echo "Polytoria commit: $SHORT_SHA ($COMMIT_DATE)"

      - name: Setup Export Presets
        run: cp Polytoria/export_presets.cfg upstream/Polytoria/export_presets.cfg

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('upstream/Polytoria/Polytoria.csproj') }}
          restore-keys: nuget-

      - name: Build .NET Project
        run: dotnet build Polytoria.sln -c ExportRelease
        working-directory: upstream

      - name: Validate Android .NET Publish
        working-directory: upstream/Polytoria
        run: |
          dotnet publish Polytoria.csproj \
            -c ExportRelease \
            -r android-arm64 \
            --self-contained true \
            -p:GodotTargetPlatform=Android \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "$RUNNER_TEMP/polytoria-dotnet-publish" \
            -v minimal

      - name: Export Android APK
        working-directory: upstream
        run: |
          OUTPUT_DIR="$PWD/build"
          mkdir -p "$OUTPUT_DIR"
          godot --verbose --headless --path Polytoria --install-android-build-template --export-release "Client Android APK" "$OUTPUT_DIR/polytoria-dev-${SHORT_SHA}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: polytoria-dev-${{ env.SHORT_SHA }}
          path: upstream/build/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Delete old dev release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const release of releases.data) {
              if (release.tag_name === 'dev-latest') {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                });
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/dev-latest`,
                }).catch(() => {});
                break;
              }
            }

      - name: Create/Update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Polytoria Dev Build"
          prerelease: true
          body: |
            ## Polytoria Dev Build (Latest)

            Automatically built from the latest [main branch](https://github.com/Polytoria/polytoria-game) commits.

            **Built from:** `${{ env.SHORT_SHA }}` (${{ env.COMMIT_DATE }})

            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK to install

            **Note:** This is an unofficial automated build from the development branch. It may be unstable. For stable releases visit [Releases](https://github.com/qaustria/polytoria-mobile-apks/releases).
          files: upstream/build/*.apk
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
