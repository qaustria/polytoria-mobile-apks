name: Build Stable APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Polytoria release tag (e.g. 2.0.19). Leave empty for latest.'
        required: false
        type: string
  schedule:
    - cron: '0 12 * * 1'

env:
  GODOT_VERSION: "4.7"
  DOTNET_VERSION: "10.0.x"

jobs:
  build-stable-apk:
    runs-on: ubuntu-latest
    name: Build Stable APK

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Android SDK
        id: cache-android
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: android-sdk-34-ndk27

      - name: Install Android SDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/android-sdk/cmdline-tools
          cd ~/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          SDKMANAGER="$HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
          $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" "platform-tools" "ndk;27.0.12077973"

      - name: Set Android env vars
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          wget -q "$GODOT_URL" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Cache Export Templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-${{ env.GODOT_VERSION }}

      - name: Download Export Templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          wget -q "$TEMPLATES_URL" -O export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Clone Polytoria
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(curl -s https://api.github.com/repos/Polytoria/polytoria-game/releases/latest | grep '"tag_name"' | head -1 | cut -d '"' -f 4)
          fi
          echo "Building version: $TAG"
          git clone --depth 1 --branch "$TAG" https://github.com/Polytoria/polytoria-game.git upstream
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Setup Export Presets
        run: cp Polytoria/export_presets.cfg upstream/Polytoria/export_presets.cfg

      - name: Install Android Build Template
        run: |
          cp -r ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android/ upstream/Polytoria/android/
          echo "Android build template installed"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('upstream/Polytoria/Polytoria.csproj') }}
          restore-keys: nuget-

      - name: Build .NET Project
        run: dotnet build Polytoria.sln -c ExportRelease
        working-directory: upstream

      - name: Export Android APK
        working-directory: upstream
        run: |
          mkdir -p build
          godot --headless --path Polytoria --export-release "Client Android APK" build/polytoria-${TAG}-stable.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: polytoria-${{ env.TAG }}-stable
          path: upstream/build/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Polytoria ${{ env.TAG }} - Android APK"
          body: |
            ## Polytoria ${{ env.TAG }} - Android APK

            Automated build from [Polytoria ${{ env.TAG }}](https://github.com/Polytoria/polytoria-game/releases/tag/${{ env.TAG }})

            ### Installation
            1. Download the APK below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK to install

            **Note:** This is an unofficial automated build. For official releases visit [polytoria.com](https://polytoria.com).
          files: upstream/build/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
